<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Prode Mundial | Iveco 2013</title>
  <link rel="stylesheet" href="style.css?v=25">
  <script src="theme.js?v=4"></script>
  <script src="loader.js?v=4"></script>
</head>
<body>

  <div id="loader" class="loader">
    <div class="loader__box">
      <img class="loader__img" src="img/carga.png" alt="">
      <p class="loader__text">Cargando</p>
      <div class="loader__bar"><span class="loader__fill"></span></div>
      <div class="loader__banner">HYDRATION BREAK</div>
    </div>
  </div>

  <header class="site-header">
    <div class="wrap">
      <div class="brand">
        <span class="brand__logo">🏆</span>
        <div>
          <h1 class="brand__title">Prode Mundial | Iveco 2013</h1>
          <p class="brand__subtitle">Pronósticos · Mundial 2026 ⭐⭐⭐</p>
        </div>
      </div>
      <button class="theme-toggle" type="button" aria-label="Cambiar tema">🌙</button>
      <button class="nav-toggle" aria-label="Menú" aria-expanded="false" aria-controls="site-nav">☰</button>
      <nav class="site-nav" id="site-nav">
        <a class="site-nav__link is-active" href="index.html">🏆 Home</a>
        <a class="site-nav__link" href="calendario.html">📅 Calendario</a>
        <a class="site-nav__link" href="resultados.html">📊 Resultados</a>
        <a class="site-nav__link" href="especiales.html">⭐ Especiales</a>
      </nav>
    </div>
  </header>

  <main class="wrap">

    <div id="live-slot"></div>

    <section class="card">
      <div class="card__head">
        <h2 class="card__title">Tabla General</h2>
        <span class="card__hint">Acumulado de todas las fechas + especiales</span>
      </div>
      <div id="general" class="tabla-scroll"></div>
    </section>

    <section class="card">
      <div class="card__head">
        <h2 class="card__title">Ranking por Fecha</h2>
        <div class="select-wrap">
          <select id="fechaSelect" class="select">
            <option>Fecha 1</option>
            <option>Fecha 2</option>
            <option selected>Fecha 3</option>
            <option>Play Off</option>
          </select>
        </div>
      </div>
      <div id="fechaRanking" class="tabla-scroll"></div>
    </section>

    <section class="card">
      <div class="card__head">
        <h2 class="card__title">Pronósticos</h2>
        <span class="card__hint">Verde = acierto · Rojo = error</span>
      </div>
      <div id="pronosticos" class="tabla-scroll"></div>
    </section>

    <section class="card">
      <div class="card__head">
        <h2 class="card__title">Predicciones</h2>
        <span class="card__hint">% según los pronósticos</span>
      </div>
      <div id="probabilidades" class="tabla-scroll"></div>
    </section>

  </main>

  <script src="paises.js?v=19"></script>
  <script src="live.js?v=19"></script>
  <script src="app.js?v=6"></script>
  <script src="nav.js?v=4"></script>

</body>
</html>
