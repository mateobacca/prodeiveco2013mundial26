<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Prode Mundial | Iveco 2013</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="site-header">
    <div class="wrap">
      <div class="brand">
        <span class="brand__logo">🏆</span>
        <div>
          <h1 class="brand__title">Prode Mundial | Iveco 2013</h1>
          <p class="brand__subtitle">Pronósticos · Mundial 2026 ⭐⭐⭐</p>
        </div>
      </div>
      <a class="nav-btn nav-btn--end" href="calendario.html" aria-label="Calendario y TV" title="Calendario y TV">📅</a>
    </div>
  </header>

  <main class="wrap">

    <section class="card">
      <div class="card__head">
        <h2 class="card__title">Tabla General</h2>
        <span class="card__hint">Acumulado de todas las fechas</span>
      </div>
      <div id="general" class="tabla-scroll"></div>
    </section>

    <section class="card">
      <div class="card__head">
        <h2 class="card__title">Ranking por Fecha</h2>
        <div class="select-wrap">
          <select id="fechaSelect" class="select">
            <option>Fecha 1</option>
            <option>Fecha 2</option>
            <option>Fecha 3</option>
            <option>Play Off</option>
          </select>
        </div>
      </div>
      <div id="fechaRanking" class="tabla-scroll"></div>
    </section>

    <section class="card">
      <div class="card__head">
        <h2 class="card__title">Pronósticos</h2>
        <span class="card__hint">Verde = acierto · Rojo = error</span>
      </div>
      <div id="pronosticos" class="tabla-scroll"></div>
    </section>

  </main>

  <script src="app.js"></script>

</body>
</html>
